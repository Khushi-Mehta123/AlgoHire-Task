services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alogo_hire
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: backend_app
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - mongodb
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/alogo_hire
      MONGODB_URI: mongodb://mongodb:27017/alogo_hire
    volumes:
      - ./backend:/app
    working_dir: /app
    command: sh -c "npm install && npm run dev"

  worker:
    build: ./backend
    container_name: worker_app
    depends_on:
      - mongodb
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/alogo_hire
      MONGODB_URI: mongodb://mongodb:27017/alogo_hire
    volumes:
      - ./backend:/app
    working_dir: /app
    command: sh -c "npm install && npm run worker"

  frontend:
    build: ./frontend
    container_name: frontend_app
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
  mongo_data: